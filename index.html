<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYX Tech Inc.</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* LOADING */
#loader {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#loader h1 {
  color: red;
  letter-spacing: 10px;
}

/* OCULTO */
#app {
  display: none;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  border-bottom: 1px solid #222;
}

.topbar button {
  background: none;
  border: none;
  color: red;
  font-size: 14px;
}

/* PANTALLAS */
.pantalla {
  display: none;
  padding: 20px;
  padding-bottom: 80px;
}

.active {
  display: block;
}

/* LOGO */
.logo {
  width: 600px;
  display: block;
  margin: 40px auto;
}

/* CARDS */
.card {
  border: 1px solid #333;
  padding: 20px;
  margin-top: 10px;
  background: #0a0a0a;
}

/* MENU INFERIOR */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-top: 1px solid #222;
  background: black;
}

.menu button {
  background: none;
  border: none;
  color: white;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader">
  <h1>NYX</h1>
</div>

<!-- APP -->
<div id="app">

  <!-- TOP -->
  <div class="topbar">
    <button onclick="mostrar('transferir')">Transferir</button>
    <button onclick="mostrar('enviar')">Enviar</button>
  </div>

  <!-- INICIO -->
  <div id="inicio" class="pantalla active">
    <img src="./logo.png" class="logo">
    <h2 style="text-align:center;">Balance: $89,450.58</h2>
  </div>

  <!-- TRANSFERIR -->
  <div id="transferir" class="pantalla">
    <h2>Transferir dinero</h2>
    <div class="card">Criptos</div>
    <div class="card">Moneda Local</div>
  </div>

  <!-- ENVIAR -->
  <div id="enviar" class="pantalla">
    <h2>Enviar dinero</h2>
    <div class="card">BBVA</div>
    <div class="card">BCP</div>
    <div class="card">Interbank</div>
    <div class="card">Scotiabank</div>
    <div class="card">NYX Balance</div>
  </div>

  <!-- OPERAR -->
  <div id="operar" class="pantalla">
    <h2>Operar</h2>
    <p>Automatización con NYX OS</p>
  </div>

  <!-- INVERTIR -->
  <div id="invertir" class="pantalla">
    <h2>Invertir</h2>
    <p>Acciones y crecimiento</p>
  </div>

</div>

<!-- MENU ABAJO -->
<div class="menu">
  <button onclick="mostrar('inicio')">Inicio</button>
  <button onclick="mostrar('operar')">Operar</button>
  <button onclick="mostrar('invertir')">Invertir</button>
  <button onclick="mostrar('transferir')">Transferir</button>
</div>

<script>
/* CAMBIAR PANTALLAS */
function mostrar(id) {
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* LOADING */
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("app").style.display = "block";
}, 1500);
</script>

</body>
</html>
