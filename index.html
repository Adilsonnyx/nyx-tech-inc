<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYX Tech Inc.</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* ANIMACIÓN */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* HERO */
header {
  padding: 100px 20px;
}

header img {
  width: 200px;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
}

h1 {
  color: red;
  font-size: 50px;
  margin: 20px 0;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.5s;
}

p {
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 1s;
}

/* SECCIONES */
section {
  padding: 60px 20px;
  max-width: 800px;
  margin: auto;
}

.card {
  border: 1px solid #333;
  padding: 20px;
  margin-top: 20px;
  background: #0a0a0a;
}
</style>
</head>

<body>

<header>
  <img src="AQUI-TU-LOGO.png">
  <h1>NYX TECH INC.</h1>
  <p>The Intelligence Layer of the World</p>
</header>

<section>
  <h2>Products</h2>

  <div class="card">
    <h3>NYX OS</h3>
    <p>Sistema inteligente que automatiza decisiones.</p>
  </div>

  <div class="card">
    <h3>NYX CORE</h3>
    <p>Dispositivo físico que lleva la IA al mundo real.</p>
  </div>
</section>

<section>
  <h2>Founder</h2>
  <p><strong>Adilson Smith Huamán Quispe</strong></p>
  <p>CEO & Founder – NYX Tech Inc.</p>
</section>

</body>
</html>
