<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYX Tech Inc.</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }

#loader { position:fixed; width:100%; height:100vh; display:flex; justify-content:center; align-items:center; background:black; }
#loader h1 { color:red; }

#app { display:none; }

.topbar { display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #222; }

button {
  background:none;
  border:1px solid red;
  color:red;
  padding:6px 12px;
  cursor:pointer;
}

.pantalla { display:none; padding:20px; padding-bottom:80px; }
.active { display:block; }

.logo { width:500px; display:block; margin:40px auto; }

.card { border:1px solid #333; padding:20px; margin-top:15px; background:#0a0a0a; }

input, select {
  width:95%;
  margin:10px auto;
  padding:10px;
  display:block;
  background:black;
  border:1px solid #333;
  color:white;
}

.menu {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #222;
  background:black;
}

.chart {
  height:100px;
  background:linear-gradient(to top, red, transparent);
  animation:move 2s infinite alternate;
}
@keyframes move {
  from {transform:scaleY(0.5);}
  to {transform:scaleY(1);}
}
</style>
</head>

<body>

<div id="loader"><h1>NYX</h1></div>

<div id="app">

<!-- TOP -->
<div class="topbar">
  <div>
    <button onclick="mostrar('transferir')">Transferir</button>
    <button onclick="mostrar('enviar')">Enviar</button>
  </div>
  <div>
    <button onclick="mostrar('login')">Login</button>
    <button onclick="mostrar('registro')">Registro</button>
  </div>
</div>

<!-- INICIO -->
<div id="inicio" class="pantalla active">
  <img src="logo.png" class="logo">
  <h2 id="liquidez" style="text-align:center;"></h2>
</div>

<!-- OPERAR -->
<div id="operar" class="pantalla">
  <h2>Operar</h2>

  <div class="card">
    <h3>GOLD</h3>
    <p id="gold"></p>
    <div class="chart"></div>
  </div>

  <div class="card">
    <h3>NASDAQ100</h3>
    <p id="nasdaq"></p>
    <div class="chart"></div>
  </div>
</div>

<!-- INVERTIR -->
<div id="invertir" class="pantalla">
  <h2>Invertir</h2>

  <input id="monto" type="number" placeholder="Monto">
  <button onclick="invertir()">Invertir</button>
  <p id="resultado"></p>

  <div class="card">
    <button onclick="plan(300)">$300 → $360</button><br><br>
    <button onclick="plan(1000)">$1000 → $1200</button><br><br>
    <button onclick="plan(5000)">$5000 → $6000</button>
  </div>
</div>

<!-- TRANSFERIR -->
<div id="transferir" class="pantalla">
  <h2>Transferir</h2>

  <div class="card">
    <h3>Criptos</h3>
    <select>
      <option>BTC</option>
      <option>ETH</option>
      <option>USDT</option>
    </select>
  </div>
</div>

<!-- ENVIAR -->
<div id="enviar" class="pantalla">
  <h2>Enviar dinero</h2>

  <label>País</label>
  <select id="pais" onchange="cargarBancos()">
    <option value="">Seleccionar país</option>
    <option value="latam">🌎 Latinoamérica</option>
    <option value="usa">🇺🇸 Estados Unidos</option>
    <option value="europa">🇪🇺 Europa</option>
  </select>

  <label>Banco</label>
  <select id="banco">
    <option>Selecciona país</option>
  </select>

  <input placeholder="Número de cuenta">

  <button onclick="enviarDinero()">Enviar</button>

  <p id="mensaje"></p>
</div>

<!-- LOGIN -->
<div id="login" class="pantalla">
  <h2>Login</h2>
  <input placeholder="Correo">
  <input type="password" placeholder="Contraseña">
  <button>Entrar</button>
</div>

<!-- REGISTRO -->
<div id="registro" class="pantalla">
  <h2>Registro</h2>
  <input placeholder="Nombre">
  <input placeholder="Correo">
  <input placeholder="Celular">
  <input placeholder="DNI">
  <button>Registrar</button>
</div>

</div>

<!-- MENU -->
<div class="menu">
  <button onclick="mostrar('inicio')">Inicio</button>
  <button onclick="mostrar('operar')">Operar</button>
  <button onclick="mostrar('invertir')">Invertir</button>
  <button onclick="mostrar('transferir')">Transferir</button>
</div>

<script>
function mostrar(id){
  document.querySelectorAll('.pantalla').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formato(n){
  return n.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
}

let gold=4992;
let nasdaq=23898.15;
let liquidez=89456.67;

function actualizar(){
  gold += (Math.random()-0.5)*5;
  nasdaq += (Math.random()-0.5)*30;
  liquidez += (Math.random()-0.5)*50;

  document.getElementById("gold").innerText="$"+formato(gold);
  document.getElementById("nasdaq").innerText=formato(nasdaq);
  document.getElementById("liquidez").innerText="NYX Liquidity: $"+formato(liquidez);
}

setInterval(actualizar,2000);
actualizar();

/* invertir */
function invertir(){
  let m=document.getElementById("monto").value;
  document.getElementById("resultado").innerText="Ganancia: $"+formato(m*1.2);
}
function plan(m){
  alert("Invertiste $" + formato(m));
}

/* bancos por secciones */
const bancos = {
  latam: [
    {grupo:"Perú", lista:["BCP","BBVA Perú","Interbank"]},
    {grupo:"Argentina", lista:["Banco Nación","Galicia","Santander"]},
    {grupo:"México", lista:["BBVA México","Banorte","HSBC"]}
  ],
  usa: [
    {grupo:"Estados Unidos", lista:["Chase","Bank of America","Wells Fargo"]}
  ],
  europa: [
    {grupo:"España", lista:["Santander","BBVA","CaixaBank"]},
    {grupo:"Alemania", lista:["Deutsche Bank","Commerzbank"]}
  ]
};

function cargarBancos(){
  let pais=document.getElementById("pais").value;
  let select=document.getElementById("banco");

  select.innerHTML="";

  if(!pais) return;

  bancos[pais].forEach(grupo=>{
    let optgroup=document.createElement("optgroup");
    optgroup.label=grupo.grupo;

    grupo.lista.forEach(b=>{
      let op=document.createElement("option");
      op.text=b;
      optgroup.appendChild(op);
    });

    select.appendChild(optgroup);
  });
}

function enviarDinero(){
  document.getElementById("mensaje").innerText="Transferencia procesada ✔";
}

setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("app").style.display="block";
},1000);
</script>

</body>
</html>
